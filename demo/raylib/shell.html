<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>nuklear_console: Demo</title>
    <meta name="description" content="Console-like user interface for Nuklear with gamepad, keyboard or mouse support. See https://github.com/RobLoach/nuklear_console">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="author" content="Rob Loach">
    <meta name="theme-color" content="#000000">
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            background: black;
        }
        #canvas {
            display: block;
            max-width: 100%;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: black;
            color: white;
            font-family: monospace;
            gap: 16px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        #loading.hidden {
            display: none;
        }
        #loading-bar-wrap {
            width: 300px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s ease;
        }
        #loading-status {
            font-size: 13px;
            opacity: 0.6;
        }
        #error {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: black;
            color: #f55;
            font-family: monospace;
            font-size: 14px;
            padding: 20px;
            text-align: center;
            gap: 12px;
        }
        #error.visible {
            display: flex;
        }
    </style>

<body>
    <div id="loading">
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
        <div id="loading-status">Loading...</div>
    </div>
    <div id="error"></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script type='text/javascript'>
        var loading = document.getElementById('loading');
        var loadingBar = document.getElementById('loading-bar');
        var loadingStatus = document.getElementById('loading-status');
        var errorDiv = document.getElementById('error');
        var totalDeps = 0;

        window.Module = {
            canvas: document.getElementById('canvas'),
            print: function() {
                var text = Array.prototype.join.call(arguments, ' ');
                console.log(text);
            },
            printErr: function() {
                var text = Array.prototype.join.call(arguments, ' ');
                console.error(text);
            },
            setStatus: function(text) {
                if (!text) {
                    loading.classList.add('hidden');
                    return;
                }
                loadingStatus.textContent = text;
            },
            monitorRunDependencies: function(left) {
                if (!totalDeps) totalDeps = left;
                if (totalDeps) {
                    loadingBar.style.width = ((totalDeps - left) / totalDeps * 100) + '%';
                }
            },
            onAbort: function(what) {
                loading.classList.add('hidden');
                errorDiv.textContent = 'Error: ' + what;
                errorDiv.classList.add('visible');
            }
        };
    </script>

</body>
</html>
